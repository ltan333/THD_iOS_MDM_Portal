services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - mdm-network
    volumes:
      - ./logs:/app/logs

  migration:
    image: arigaio/atlas
    volumes:
      - ./backend/internal/ent/migrate/migrations:/migrations
    env_file:
      - ./backend/.env
    command: migrate apply --url "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable" --dir "file:///migrations" 
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mdm-network

  db:
    image: postgres:15-alpine
    container_name: mdm-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdm-network

  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    ports:
      - "6379:6379"
    networks:
      - mdm-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  mdm-network:
    driver: bridge

volumes:
  postgres_data:
