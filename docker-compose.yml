services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mdm-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mdm-network

  db:
    image: postgres:15-alpine
    container_name: mdm-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-go_backend_template}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-go_backend_template}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mdm-network

networks:
  mdm-network:
    driver: bridge

volumes:
  postgres_data:
