services:
  # ─────────────────────────────────────────────
  # MDM Portal Backend
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: thd-mdm-portal-backend:latest
    container_name: mdm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_MAX_OPEN_CONNS=20
      - DB_MAX_IDLE_CONNS=5
      - DB_CONN_MAX_LIFETIME_MINUTES=3
      - LOG_FILE_PATH=/app/logs/app.log
    depends_on:
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - mdm-network
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────
  # Atlas DB Migration (one-shot)
  # ─────────────────────────────────────────────
  migration:
    image: arigaio/atlas:latest
    container_name: mdm-migration
    volumes:
      - ./backend/internal/ent/migrate/migrations:/migrations:ro
    env_file:
      - ./backend/.env
    command: >
      migrate apply
      --url "postgres://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}?sslmode=disable"
      --dir "file:///migrations"
      --allow-dirty
    networks:
      - mdm-network


  # ─────────────────────────────────────────────
  # Redis (JWT blacklist / session cache)
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mdm-redis
    restart: unless-stopped
    # ports:
    #   - "6379:6379"
    networks:
      - mdm-network
    volumes:
      - ./logs/redis:/var/log/redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  mdm-network:
    external: true
    name: global_mdm_network

volumes:
  postgres_data:
    driver: local
