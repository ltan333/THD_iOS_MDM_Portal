host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Server for THD iOS MDM Portal.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: THD iOS MDM Portal API
  version: "1.0"
paths:
  /api/v1/alerts:
    get:
      description: Fetch tracked system alerts with support for pagination and filtering
        by severity, type, and status.
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20)
        in: query
        name: limit
        type: integer
      - description: Filter by severity (info, warning, critical)
        in: query
        name: severity
        type: string
      - description: Filter by alert type
        in: query
        name: type
        type: string
      - description: Filter by status (open, acknowledged, resolved)
        in: query
        name: status
        type: string
      - description: Search in title and details
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of alerts
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_ListResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_AlertResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: List alerts
      tags:
      - Alerts
    post:
      consumes:
      - application/json
      description: Manually create a new system alert.
      parameters:
      - description: Alert details
        in: body
        name: alert
        required: true
        schema:
          $ref: '#/definitions/github_com_thienel_go-backend-template_internal_interface_api_dto.CreateAlertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Alert created successfully
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_AlertResponse'
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: Create alert
      tags:
      - Alerts
  /api/v1/alerts/{id}:
    get:
      description: Retrieve details of a specific alert by its unique ID.
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Alert details
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_AlertResponse'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "404":
          description: Alert not found
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: Get alert by ID
      tags:
      - Alerts
  /api/v1/alerts/{id}/acknowledge:
    put:
      description: Mark an alert as acknowledged by an administrator.
      parameters:
      - description: Alert ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Alert acknowledged
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "400":
          description: Invalid ID format
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "404":
          description: Alert not found
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: Acknowledge alert
