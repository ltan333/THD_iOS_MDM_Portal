host: localhost:8000
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Server for THD iOS MDM Portal.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: THD iOS MDM Portal API
  version: "1.0"
paths:
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT tokens
      parameters:
      - description: Login credentials
        in: body
        name: login
        required: true
        schema:
          $ref: '#/definitions/github_com_thienel_go-backend-template_internal_interface_api_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      summary: User login
      tags:
      - Authentication
  /v1/auth/logout:
    post:
      description: Invalidate the current session
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - Authentication
  /v1/auth/me:
    get:
      description: Return the profile of the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_UserResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: Get current user info
      tags:
      - Authentication
  /v1/dep/assigner/{name}:
    get:
      description: Get assigner for a specific DEP name
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get DEP assigner
      tags:
      - DEP
    put:
      description: Set or update automatic profile assignment for a DEP name
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      - description: Profile UUID to assign
        in: query
        name: profile_uuid
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-github_com_thienel_go-backend-template_internal_interface_api_dto_DEPAssignerResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: Set DEP assigner
      tags:
      - DEP
  /v1/dep/config/{name}:
    get:
      description: Get configuration for a specific DEP name
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get DEP config
      tags:
      - DEP
  /v1/dep/names:
    get:
      description: List all configured DEP names in NanoDEP
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: List DEP names
      tags:
      - DEP
  /v1/dep/profiles:
    get:
      description: Fetch all defined DEP profiles from NanoDEP
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_thienel_go-backend-template_pkg_response.APIResponse-any'
      security:
      - BearerAuth: []
      summary: List Defined DEP profiles
      tags:
      - DEP
  /v1/dep/proxy/{name}/account:
    get:
      description: Fetch Apple DEP account info via proxy
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get DEP account
      tags:
      - DEP
  /v1/dep/proxy/{name}/devices:
    post:
      consumes:
      - application/json
      description: Fetch device list or details from Apple via proxy. If devices array
        is provided in body, fetches details for those serial numbers.
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      - description: Devices list
        in: body
        name: request
        schema:
          $ref: '#/definitions/github_com_thienel_go-backend-template_internal_interface_api_dto.DEPDevicesRequest'
      - description: Pagination cursor
        in: query
        name: cursor
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get DEP devices
      tags:
      - DEP
  /v1/dep/proxy/{name}/devices/disown:
    post:
      consumes:
      - application/json
      description: Remove a device from DEP management via proxy
      parameters:
      - description: DEP name
        in: path
        name: name
        required: true
        type: string
      - description: Devices list to disown
        in: body
        name: request
